<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beacon — Business Intelligence by PGG</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#1a2744;--navy-light:#243352;--navy-dark:#111b30;--gold:#c9a84c;--gold-light:#e0c876;--gold-dark:#a88a35;--bg:#f0f2f5;--card:#fff;--text:#2c3e50;--text-light:#7f8c8d;--border:#e1e5ea;--green:#27ae60;--red:#e74c3c;--orange:#f39c12;--blue:#3498db;--purple:#9b59b6;--sidebar-w:260px;--sidebar-collapsed:0px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;overflow-x:hidden}
/* Sidebar */
.sidebar{width:var(--sidebar-w);background:linear-gradient(180deg,var(--navy) 0%,var(--navy-dark) 100%);color:#fff;position:fixed;top:0;left:0;height:100vh;z-index:1000;transition:transform .3s ease;display:flex;flex-direction:column;overflow-y:auto}
.sidebar-header{padding:24px 20px 20px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-header h1{font-size:22px;font-weight:700;color:var(--gold);letter-spacing:1px}
.sidebar-header p{font-size:11px;color:rgba(255,255,255,.5);margin-top:4px;letter-spacing:.5px}
.nav-items{flex:1;padding:12px 0}
.nav-item{display:flex;align-items:center;padding:11px 20px;cursor:pointer;transition:all .2s;font-size:13.5px;color:rgba(255,255,255,.65);border-left:3px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item.active{background:rgba(201,168,76,.1);color:var(--gold);border-left-color:var(--gold)}
.nav-item svg{width:18px;height:18px;margin-right:12px;flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:rgba(255,255,255,.35)}
/* Main */
.main{margin-left:var(--sidebar-w);flex:1;min-height:100vh;transition:margin-left .3s}
.topbar{background:#fff;padding:16px 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:4px}
.hamburger svg{width:24px;height:24px;color:var(--navy)}
.topbar-title{font-size:18px;font-weight:600;color:var(--navy)}
.topbar-right{display:flex;align-items:center;gap:16px;font-size:13px;color:var(--text-light)}
.topbar-right .badge{background:var(--gold);color:var(--navy);padding:2px 10px;border-radius:12px;font-weight:600;font-size:11px}
.content{padding:28px 32px}
/* Tab panels */
.tab-panel{display:none}
.tab-panel.active{display:block}
/* Cards */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px;margin-bottom:28px}
.card{background:var(--card);border-radius:12px;padding:22px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid var(--border)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.card-title{font-size:12px;color:var(--text-light);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.card-value{font-size:28px;font-weight:700;color:var(--navy)}
.card-change{font-size:12px;margin-top:4px;font-weight:600}
.card-change.up{color:var(--green)}.card-change.down{color:var(--red)}
.card-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
/* Sections */
.section{background:var(--card);border-radius:12px;padding:24px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid var(--border);margin-bottom:24px}
.section-title{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:18px;display:flex;align-items:center;gap:8px}
.section-title::before{content:'';width:3px;height:18px;background:var(--gold);border-radius:2px}
/* Charts */
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px}
.chart-container{position:relative;height:280px}
/* Tables */
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{background:var(--navy);color:#fff;padding:10px 14px;text-align:left;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.3px}
.data-table th:first-child{border-radius:8px 0 0 0}.data-table th:last-child{border-radius:0 8px 0 0}
.data-table td{padding:10px 14px;border-bottom:1px solid var(--border)}
.data-table tr:hover td{background:rgba(26,39,68,.02)}
.data-table tr:last-child td:first-child{border-radius:0 0 0 8px}.data-table tr:last-child td:last-child{border-radius:0 0 8px 0}
/* Badges */
.badge-pill{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}
.badge-green{background:#e8f8f0;color:#27ae60}.badge-red{background:#fde8e8;color:#e74c3c}
.badge-orange{background:#fef3e2;color:#f39c12}.badge-blue{background:#e8f0fe;color:#3498db}
.badge-purple{background:#f3e8fd;color:#9b59b6}.badge-navy{background:#e8ecf3;color:#1a2744}
/* Gauge */
.gauge-wrap{display:flex;align-items:center;gap:20px;margin-bottom:16px}
.gauge-bar{flex:1;height:12px;background:#e8ecf3;border-radius:6px;overflow:hidden}
.gauge-fill{height:100%;border-radius:6px;transition:width .8s ease}
.gauge-label{font-size:13px;font-weight:600;min-width:50px;text-align:right}
/* Progress */
.progress-sm{height:6px;background:#e8ecf3;border-radius:3px;overflow:hidden;margin-top:6px}
.progress-sm .fill{height:100%;border-radius:3px}
/* Risk matrix */
.risk-matrix{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.risk-cell{padding:14px;border-radius:8px;text-align:center;font-size:12px;font-weight:600}
/* KPI row */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.kpi-item{text-align:center;padding:16px}
.kpi-value{font-size:32px;font-weight:700;color:var(--navy)}
.kpi-label{font-size:12px;color:var(--text-light);margin-top:4px}
/* Score circle */
.score-circle{width:100px;height:100px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;margin:0 auto 12px;border:4px solid}
/* Timeline */
.timeline{position:relative;padding-left:28px}
.timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:var(--border)}
.timeline-item{position:relative;margin-bottom:20px}
.timeline-item::before{content:'';position:absolute;left:-24px;top:4px;width:12px;height:12px;border-radius:50%;border:2px solid var(--gold);background:#fff}
.timeline-item.done::before{background:var(--gold)}
.timeline-date{font-size:11px;color:var(--text-light);margin-bottom:2px}
.timeline-text{font-size:13px;font-weight:500}
/* Mobile */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:999}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .overlay.show{display:block}
  .main{margin-left:0}
  .hamburger{display:block}
  .content{padding:20px 16px}
  .topbar{padding:12px 16px}
  .chart-row{grid-template-columns:1fr}
  .cards-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
}
@media(max-width:480px){
  .cards-grid{grid-template-columns:1fr 1fr}
  .kpi-row{grid-template-columns:1fr 1fr}
}
/* Scrollbar */
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1>&#9670; BEACON</h1>
    <p>Business Intelligence by PGG</p>
  </div>
  <div class="nav-items" id="navItems"></div>
  <div class="sidebar-footer">Beacon BI v2.1 &middot; &copy; 2026 PGG Group</div>
</nav>

<div class="main">
  <div class="topbar">
    <button class="hamburger" onclick="toggleSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
    <div class="topbar-title" id="topbarTitle">Overview</div>
    <div class="topbar-right">
      <span class="badge">LIVE</span>
      <span>15 Mar 2026</span>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>

<script>
// ── NAV CONFIG ──
const tabs = [
  {id:'overview',label:'Overview',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>'},
  {id:'financial',label:'Financial Health',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>'},
  {id:'acquisition',label:'Acquisition Analysis',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>'},
  {id:'operations',label:'Operational Intelligence',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>'},
  {id:'recruitment',label:'Recruitment & Workforce',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>'},
  {id:'commissioner',label:'Commissioner Relations',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>'},
  {id:'property',label:'Property Management',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>'},
  {id:'serviceuser',label:'Service User Journey',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>'},
  {id:'regulatory',label:'Regulatory Dashboard',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>'}
];

// ── DEMO DATA ──
const properties = ['Beacon House','Oakwood Lodge','Riverside View','Meadow Court','Hillside Manor','Elm Park'];
const months = ['Oct','Nov','Dec','Jan','Feb','Mar'];
const councils = ['Kent CC','Surrey CC','Essex CC','Hampshire CC','Sussex CC','London Borough of Southwark'];
const staffNames = ['S. Thompson','J. Patel','R. Williams','A. Kowalski','M. Chen','D. Okafor','L. Hughes','B. Nguyen','K. Morrison','F. Ahmed','T. Lewis','C. Murphy','N. Singh','P. Barker','E. Rees','H. Yilmaz','G. Brown','I. Fernandez','W. Clarke','O. Adebayo'];

// ── SIDEBAR RENDER ──
const navEl = document.getElementById('navItems');
tabs.forEach((t,i) => {
  const d = document.createElement('div');
  d.className = 'nav-item' + (i===0?' active':'');
  d.dataset.tab = t.id;
  d.innerHTML = t.icon + '<span>'+t.label+'</span>';
  d.onclick = () => switchTab(t.id);
  navEl.appendChild(d);
});

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

function switchTab(id){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.tab===id));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.toggle('active',p.id==='tab-'+id));
  const t = tabs.find(t=>t.id===id);
  document.getElementById('topbarTitle').textContent = t?t.label:'';
  if(window.innerWidth<769) toggleSidebar();
  if(chartInits[id]) chartInits[id]();
}

// ── HELPERS ──
const fmt = n => '£'+n.toLocaleString('en-GB');
const pct = n => n+'%';

function makeTable(headers, rows, opts={}){
  let h = '<table class="data-table"><thead><tr>'+headers.map(h=>'<th>'+h+'</th>').join('')+'</tr></thead><tbody>';
  rows.forEach(r=>{h+='<tr>'+r.map(c=>'<td>'+c+'</td>').join('')+'</tr>';});
  return h+'</tbody></table>';
}

function badge(text, color){ return '<span class="badge-pill badge-'+color+'">'+text+'</span>'; }

function gaugeHTML(label, value, max, color){
  const p = Math.round(value/max*100);
  return `<div class="gauge-wrap"><span style="min-width:120px;font-size:13px">${label}</span><div class="gauge-bar"><div class="gauge-fill" style="width:${p}%;background:${color}"></div></div><span class="gauge-label">${p}%</span></div>`;
}

// ── TAB CONTENT BUILDERS ──
const content = document.getElementById('content');
const chartInits = {};

function buildAllTabs(){
  let html = '';

  // 1. OVERVIEW
  html += `<div class="tab-panel active" id="tab-overview">
    <div class="cards-grid">
      <div class="card"><div class="card-header"><div><div class="card-title">Monthly Revenue</div><div class="card-value">${fmt(487250)}</div><div class="card-change up">&#9650; 8.3% vs last month</div></div><div class="card-icon" style="background:#e8f0fe;color:#3498db">&#163;</div></div></div>
      <div class="card"><div class="card-header"><div><div class="card-title">Service Users</div><div class="card-value">30</div><div class="card-change up">&#9650; 2 new this month</div></div><div class="card-icon" style="background:#e8f8f0;color:#27ae60">&#9825;</div></div></div>
      <div class="card"><div class="card-header"><div><div class="card-title">Staff Count</div><div class="card-value">40</div><div class="card-change up">&#9650; 3 hired this quarter</div></div><div class="card-icon" style="background:#f3e8fd;color:#9b59b6">&#9734;</div></div></div>
      <div class="card"><div class="card-header"><div><div class="card-title">Occupancy Rate</div><div class="card-value">88%</div><div class="card-change up">&#9650; 4% vs last quarter</div></div><div class="card-icon" style="background:#fef3e2;color:#f39c12">&#8962;</div></div></div>
      <div class="card"><div class="card-header"><div><div class="card-title">Properties</div><div class="card-value">6</div><div class="card-change">Across 3 regions</div></div><div class="card-icon" style="background:#e8ecf3;color:#1a2744">&#9750;</div></div></div>
      <div class="card"><div class="card-header"><div><div class="card-title">CQC Readiness</div><div class="card-value">92%</div><div class="card-change up">&#9650; On track</div></div><div class="card-icon" style="background:#e8f8f0;color:#27ae60">&#10003;</div></div></div>
      <div class="card"><div class="card-header"><div><div class="card-title">Cash Position</div><div class="card-value">${fmt(1245000)}</div><div class="card-change up">&#9650; Healthy</div></div><div class="card-icon" style="background:#e8f0fe;color:#3498db">&#9733;</div></div></div>
      <div class="card"><div class="card-header"><div><div class="card-title">Open Vacancies</div><div class="card-value">5</div><div class="card-change down">&#9660; 2 urgent</div></div><div class="card-icon" style="background:#fde8e8;color:#e74c3c">&#9888;</div></div></div>
    </div>
    <div class="chart-row">
      <div class="section"><div class="section-title">Revenue Trend (6 Months)</div><div class="chart-container"><canvas id="overviewRevChart"></canvas></div></div>
      <div class="section"><div class="section-title">Occupancy by Property</div><div class="chart-container"><canvas id="overviewOccChart"></canvas></div></div>
    </div>
    <div class="section"><div class="section-title">Property Summary</div>
      ${makeTable(['Property','Beds','Occupied','Occupancy','Monthly Rev','Staff','CQC Rating'],[
        ['Beacon House','8','7','88%',fmt(72400),'8',badge('Good','green')],
        ['Oakwood Lodge','6','6','100%',fmt(68200),'7',badge('Good','green')],
        ['Riverside View','5','4','80%',fmt(52100),'6',badge('Good','green')],
        ['Meadow Court','6','5','83%',fmt(58600),'7',badge('Requires Improvement','orange')],
        ['Hillside Manor','5','5','100%',fmt(62400),'6',badge('Outstanding','blue')],
        ['Elm Park','4','3','75%',fmt(45200),'6',badge('Good','green')]
      ])}
    </div>
  </div>`;

  // 2. FINANCIAL HEALTH
  html += `<div class="tab-panel" id="tab-financial">
    <div class="cards-grid">
      <div class="card"><div class="card-header"><div><div class="card-title">Total Revenue (YTD)</div><div class="card-value">${fmt(2785400)}</div><div class="card-change up">&#9650; 12.1% YoY</div></div></div></div>
      <div class="card"><div class="card-header"><div><div class="card-title">Net Profit Margin</div><div class="card-value">18.4%</div><div class="card-change up">&#9650; 2.1pp</div></div></div></div>
      <div class="card"><div class="card-header"><div><div class="card-title">Payroll as % Rev</div><div class="card-value">52.3%</div><div class="card-change down">&#9660; Target &lt;55%</div></div></div></div>
      <div class="card"><div class="card-header"><div><div class="card-title">Aged Debtors &gt;90d</div><div class="card-value">${fmt(34200)}</div><div class="card-change down">&#9660; 3 invoices</div></div></div></div>
    </div>
    <div class="chart-row">
      <div class="section"><div class="section-title">Revenue vs Expenses</div><div class="chart-container"><canvas id="finRevExpChart"></canvas></div></div>
      <div class="section"><div class="section-title">Revenue by Source</div><div class="chart-container"><canvas id="finSourceChart"></canvas></div></div>
    </div>
    <div class="section"><div class="section-title">Payroll Cost Gauge</div>
      ${gaugeHTML('Beacon House','52','100','#27ae60')}
      ${gaugeHTML('Oakwood Lodge','48','100','#27ae60')}
      ${gaugeHTML('Riverside View','57','100','#f39c12')}
      ${gaugeHTML('Meadow Court','54','100','#27ae60')}
      ${gaugeHTML('Hillside Manor','50','100','#27ae60')}
      ${gaugeHTML('Elm Park','61','100','#e74c3c')}
    </div>
    <div class="section"><div class="section-title">Cash Position (Runway)</div>
      <div class="kpi-row">
        <div class="kpi-item"><div class="kpi-value" style="color:var(--green)">${fmt(1245000)}</div><div class="kpi-label">Current Cash</div></div>
        <div class="kpi-item"><div class="kpi-value">6.2</div><div class="kpi-label">Months Runway</div></div>
        <div class="kpi-item"><div class="kpi-value">${fmt(201000)}</div><div class="kpi-label">Monthly Burn</div></div>
        <div class="kpi-item"><div class="kpi-value">${fmt(487250)}</div><div class="kpi-label">Monthly Income</div></div>
      </div>
    </div>
    <div class="section"><div class="section-title">Aged Debtors</div>
      ${makeTable(['Council','Amount','Days Outstanding','Status','Action'],[
        ['Kent CC',fmt(14200),'95',badge('Overdue','red'),'Escalation sent 08/03'],
        ['Surrey CC',fmt(8400),'102',badge('Overdue','red'),'Legal review pending'],
        ['Essex CC',fmt(11600),'91',badge('Overdue','red'),'Payment plan agreed'],
        ['Hampshire CC',fmt(22800),'45',badge('Current','green'),'Invoice sent'],
        ['Sussex CC',fmt(18500),'30',badge('Current','green'),'On track'],
      ])}
    </div>
    <div class="section"><div class="section-title">Per-Property P&amp;L (Monthly)</div>
      ${makeTable(['Property','Revenue','Payroll','Overheads','Net Profit','Margin'],[
        ['Beacon House',fmt(72400),fmt(37600),fmt(12800),fmt(22000),'30.4%'],
        ['Oakwood Lodge',fmt(68200),fmt(32700),fmt(11200),fmt(24300),'35.6%'],
        ['Riverside View',fmt(52100),fmt(29700),fmt(9800),fmt(12600),'24.2%'],
        ['Meadow Court',fmt(58600),fmt(31600),fmt(10400),fmt(16600),'28.3%'],
        ['Hillside Manor',fmt(62400),fmt(31200),fmt(10600),fmt(20600),'33.0%'],
        ['Elm Park',fmt(45200),fmt(27600),fmt(9200),fmt(8400),'18.6%'],
      ])}
    </div>
  </div>`;

  // 3. ACQUISITION ANALYSIS
  html += `<div class="tab-panel" id="tab-acquisition">

const chartDefaults = {responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:11,family:'-apple-system,BlinkMacSystemFont,sans-serif'},padding:12}}}};
Chart.defaults.font.family = '-apple-system,BlinkMacSystemFont,sans-serif';

const navy = '#1a2744', gold = '#c9a84c', blue = '#3498db', green = '#27ae60', red = '#e74c3c', orange = '#f39c12', purple = '#9b59b6';
const navyA = 'rgba(26,39,68,.7)', goldA = 'rgba(201,168,76,.7)';

let charts = {};
function makeChart(id, config){
  if(charts[id]) charts[id].destroy();
  const ctx = document.getElementById(id);
  if(!ctx) return;
  charts[id] = new Chart(ctx.getContext('2d'), config);
}
